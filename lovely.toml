[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "_tag.children[2].children[1].config.colour = G.C.UI.TEXT_LIGHT"
position = "after"
payload = '''
    _tag.children[3].config.button = 'skip_blind'
    _tag.config.outline_colour = adjust_alpha(G.C.BLUE, 0.5)
    _tag.children[3].config.hover = true
    _tag.children[3].config.colour = G.C.RED
    _tag.children[3].children[1].config.colour = G.C.UI.TEXT_LIGHT
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "_tag.children[2].children[1].config.colour = G.C.UI.TEXT_INACTIVE"
position = "after"
payload = '''
    _tag.children[3].config.button = nil
    _tag.children[3].config.hover = false
    _tag.children[3].config.colour = G.C.UI.BACKGROUND_INACTIVE
    _tag.children[3].children[1].config.colour = G.C.UI.TEXT_INACTIVE
'''
match_indent = true

# Bosses as small/big blinds patches from Cryptid
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "if G.GAME.blind:get_type() == 'Boss' then"
position = "at"
payload = "if G.GAME.blind_on_deck == 'Boss' then"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "if G.GAME.round_resets.ante == G.GAME.win_ante and G.GAME.blind:get_type() == 'Boss' then"
position = "at"
payload = "if G.GAME.round_resets.ante >= G.GAME.win_ante and G.GAME.blind_on_deck == 'Boss' then"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "if G.GAME.round_resets.blind == G.P_BLINDS.bl_small then"
position = "at"
payload = "if G.GAME.blind_on_deck == 'Small' then"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "elseif G.GAME.round_resets.blind == G.P_BLINDS.bl_big then"
position = "at"
payload = "elseif G.GAME.blind_on_deck == 'Big' then"
match_indent = true